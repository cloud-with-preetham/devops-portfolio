name: SAST Scan

on:
  workflow_call:

jobs:
  codeql:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - uses: github/codeql-action/analyze@v4
